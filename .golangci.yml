# .golangci.yml
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - loglint
  settings:
    custom:
      loglint:
        type: module
        description: Log message style checker for slog/zap
        settings:
          enabled_rules:
            lowercase-start: true
            english-only: true
            no-special-chars: true
            no-sensitive-data: true
          sensitive_keywords:
            - password
            - token
            - api_key
          sensitive_patterns:
            - "\\bapi[_-]?key\\b"
            - "\\bbearer\\b"
