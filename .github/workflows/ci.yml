name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.8.0

      - name: Build custom golangci-lint with plugin
        run: |
          "$(go env GOPATH)/bin/golangci-lint" custom

      - name: Run custom golangci-lint
        run: |
          ./custom-golangci-lint run ./... --timeout=5m
